<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Makro SPA</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-header">
        <h1>Gestor de Productos Comercializadora Makro SPA</h1>
    </div>
    <div class="nav-actions">
        <button class="nav-btn active" onclick="showView('add-view', this)">✚ Agregar producto</button>
        <button class="nav-btn" onclick="showView('list-view', this)">📋 Listar e Inventario</button>
    </div>
</nav>

<div class="content">
    <div id="add-view" class="view active">
        <div class="card">
            <h2>Detalles del Nuevo Equipo</h2>
            <form id="add-form">
                <div class="form-group">
                    <label>Título del Producto</label>
                    <input type="text" id="nombre" placeholder="Nombre completo del equipo" required>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="cat" required onchange="cargarSubcategorias()">
                            <option value="">Seleccione Categoría</option>
                            <option value="elec_domiciliaria">Electricidad Domiciliaria</option>
                            <option value="elec_industrial">Electricidad Industrial</option>
                            <option value="herramientas">Herramientas</option>
                            <option value="ferreteria_industrial">Ferretería Industrial</option>
                            <option value="gasfiteria">Gasfitería</option>
                            <option value="epp">EPP (Protección Personal)</option>
                            <option value="seguridad_vigilancia">Seguridad y Vigilancia</option>
                            <option value="automatizacion_control">Automatización y Control</option>
                            <option value="iluminacion">Iluminación LED</option>
                            <option value="ernc_riego">ERNC - Riego</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Sub-Categoría</label>
                        <select id="subcat" required disabled>
                            <option value="">Primero elija categoría</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="stock" value="0">
                    </div>

                    <div class="form-group full">
    <label>Fotografías del Equipo (JPG o PNG - Se convertirán a WebP optimizado)</label>
    <div class="grid-photos">
        <div class="photo-upload">
            <input type="file" id="foto1" accept="image/jpeg, image/png" onchange="previewAndProcess(this, 'p1')">
            <img id="p1" class="thumb-preview" src="" style="display:none">
        </div>
        <div class="photo-upload">
            <input type="file" id="foto2" accept="image/jpeg, image/png" onchange="previewAndProcess(this, 'p2')">
            <img id="p2" class="thumb-preview" src="" style="display:none">
        </div>
        <div class="photo-upload">
            <input type="file" id="foto3" accept="image/jpeg, image/png" onchange="previewAndProcess(this, 'p3')">
            <img id="p3" class="thumb-preview" src="" style="display:none">
        </div>
    </div>
</div>
                </div>

                <div class="form-group">
                    <label>Descripción Técnica</label>
                    <textarea id="desc" placeholder="Especificaciones, dimensiones, etc."></textarea>
                </div>

                <button type="submit" class="btn-main">Inyectar Producto</button>
            </form>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Editar Producto</h3>
        
        <div class="form-group">
            <label>Título</label>
            <input type="text" id="edit-nombre">
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Categoría</label>
                <select id="edit-cat" onchange="cargarSubcategoriasEdicion()">
                    <option value="">Seleccione Categoría</option>
                    <option value="elec_domiciliaria">Electricidad Domiciliaria</option>
                    <option value="elec_industrial">Electricidad Industrial</option>
                    <option value="herramientas">Herramientas (Total/Manuales)</option>
                    <option value="ferreteria_industrial">Ferretería Industrial</option>
                    <option value="gasfiteria">Gasfitería</option>
                    <option value="epp">EPP (Protección Personal)</option>
                    <option value="seguridad_vigilancia">Seguridad y Vigilancia</option>
                    <option value="automatizacion_control">Automatización y Control</option>
                    <option value="iluminacion">Iluminación LED</option>
                    <option value="ernc_riego">ERNC - Riego</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sub-Categoría</label>
                <select id="edit-subcat">
                    <option value="">Seleccione Sub-Categoría</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Stock Actual</label>
                <input type="number" id="edit-stock">
            </div>
            <div class="form-group">
                <label>Foto Nueva (Opcional)</label>
                <input type="file" id="edit-foto" accept="image/*">
            </div>
        </div>

        <div class="form-group">
            <label>Descripción Técnica</label>
            <textarea id="edit-desc"></textarea>
        </div>

        <button class="btn-main" onclick="saveEdit()">Actualizar Datos</button>
        <button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px; cursor:pointer; color: #666;">Cancelar</button>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<script src="admin.js"></script>
    
</body>
</html>
