<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Makro SPA</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="inyeccion-supabase.js"></script>
    <script src="lista-inventario.js"></script>
</head>
    
<body>

<nav class="navbar">
    <div class="nav-header">
        <h1>Gestor de Productos Comercializadora Makro SPA</h1>
    </div>
    <div class="nav-actions">
        <button class="nav-btn active" onclick="showView('add-view', this)">✚ Agregar producto</button>
        <button class="nav-btn" onclick="showView('list-view', this)">📋 Listar e Inventario</button>
    </div>
</nav>

<div class="content">
    <div id="add-view" class="view active">
        <div class="card">
            <h2>Detalles del Nuevo Equipo</h2>
            <form id="add-form">
                <div class="form-group">
                    <label>Título del Producto</label>
                    <input type="text" id="nombre" placeholder="Nombre completo del equipo" required>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="cat" required onchange="cargarSubcategorias()">
                            <option value="">Seleccione Categoría</option>
                            <option value="elec_domiciliaria">Electricidad Domiciliaria</option>
                            <option value="elec_industrial">Electricidad Industrial</option>
                            <option value="herramientas">Herramientas</option>
                            <option value="ferreteria_industrial">Ferretería Industrial</option>
                            <option value="gasfiteria">Gasfitería</option>
                            <option value="epp">EPP (Protección Personal)</option>
                            <option value="seguridad_vigilancia">Seguridad y Vigilancia</option>
                            <option value="automatizacion_control">Automatización y Control</option>
                            <option value="iluminacion">Iluminación LED</option>
                            <option value="ernc_riego">ERNC - Riego</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Sub-Categoría</label>
                        <select id="subcat" required disabled>
                            <option value="">Primero elija categoría</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="stock" value="0">
                    </div>

                    <div class="form-group full">
    <label>Fotografías del Equipo (JPG o PNG - Se convertirán a WebP optimizado)</label>
    <div class="grid-photos">
        <div class="photo-upload">
            <input type="file" id="foto1" accept="image/jpeg, image/png" onchange="previewAndProcess(this, 'p1')">
            <img id="p1" class="thumb-preview" src="" style="display:none">
        </div>
        <div class="photo-upload">
            <input type="file" id="foto2" accept="image/jpeg, image/png" onchange="previewAndProcess(this, 'p2')">
            <img id="p2" class="thumb-preview" src="" style="display:none">
        </div>
        <div class="photo-upload">
            <input type="file" id="foto3" accept="image/jpeg, image/png" onchange="previewAndProcess(this, 'p3')">
            <img id="p3" class="thumb-preview" src="" style="display:none">
        </div>
    </div>
</div>
                </div>

                <div class="form-group">
                    <label>Descripción Técnica</label>
                    <textarea id="desc" placeholder="Especificaciones, dimensiones, etc."></textarea>
                </div>

                <button type="submit" class="btn-main">Inyectar Producto</button>
            </form>
        </div>
    </div>
</div>

<div id="list-view" class="view">
    <div class="card">
        <div class="list-header">
            <h2>Inventario en Tiempo Real</h2>
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Buscar por nombre o categoría..." onkeyup="filterTable()">
            </div>
        </div>
        
        <div class="table-container">
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="inventory-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="edit-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Editar Producto</h3>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        
        <form id="edit-form" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="edit-nombre">Título del Equipo</label>
                <input type="text" id="edit-nombre" placeholder="Ej: Taladro Percutor 13mm">
            </div>

            <div class="grid">
                <div class="form-group">
                    <label for="edit-cat">Categoría</label>
                    <select id="edit-cat" onchange="cargarSubcategoriasEdicion()">
                        <option value="">Seleccione Categoría</option>
                        <option value="elec_domiciliaria">Electricidad Domiciliaria</option>
                        <option value="elec_industrial">Electricidad Industrial</option>
                        <option value="herramientas">Herramientas</option>
                        <option value="ferreteria_industrial">Ferretería Industrial</option>
                        <option value="gasfiteria">Gasfitería</option>
                        <option value="epp">EPP (Protección Personal)</option>
                        <option value="seguridad_vigilancia">Seguridad y Vigilancia</option>
                        <option value="automatizacion_control">Automatización y Control</option>
                        <option value="iluminacion">Iluminación LED</option>
                        <option value="ernc_riego">ERNC - Riego</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-subcat">Sub-Categoría</label>
                    <select id="edit-subcat">
                        <option value="">Seleccione Sub-Categoría</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label for="edit-stock">Stock Actual</label>
                    <input type="number" id="edit-stock" min="0">
                </div>
                <div class="form-group full">
                    <label>Fotografías del Equipo (Opcional - Se reemplazarán solo las que selecciones)</label>
                        <div class="grid-photos">
                        <div class="photo-upload">
                            <input type="file" id="edit-foto1" accept="image/jpeg, image/png">
                            <small>Foto 1 (Principal)</small>
                    </div>
                        <div class="photo-upload">
                        <input type="file" id="edit-foto2" accept="image/jpeg, image/png">
                    <small>Foto 2</small>
        </div>
        <div class="photo-upload">
            <input type="file" id="edit-foto3" accept="image/jpeg, image/png">
            <small>Foto 3</small>
        </div>
    </div>
</div>
            </div>

            <div class="form-group">
                <label for="edit-desc">Descripción Técnica</label>
                <textarea id="edit-desc" rows="4" placeholder="Especificaciones, dimensiones, etc."></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-main" onclick="saveEdit()">Actualizar Datos</button>
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </form>
    </div>
</div>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    
</body>
</html>
