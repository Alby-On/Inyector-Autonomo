<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inyector Pro - Albyon Digital</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.5rem; text-align: center; margin-bottom: 24px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: all 0.2s;
        }
        
        input:focus, textarea:focus { border-color: var(--primary); outline: 2px solid #dbeafe; }

        /* Área de descripción destacada */
        textarea { resize: vertical; min-height: 120px; font-family: inherit; }
        
        .row { display: flex; gap: 16px; }
        .col { flex: 1; }
        
        .file-upload { 
            border: 2px dashed #cbd5e1; padding: 20px; border-radius: 8px; text-align: center; background: #f1f5f9; cursor: pointer;
        }
        
        button {
            width: 100%; background-color: var(--primary); color: white; padding: 14px; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 20px;
        }
        button:hover { opacity: 0.9; }
        
        .preview-box { margin-top: 15px; text-align: center; }
        #preview-img { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h2>Módulo de Inyección de Productos</h2>
    
    <form id="product-form">
        <div class="form-group">
            <label for="nombre">Nombre del Equipo / Producto</label>
            <input type="text" id="nombre" placeholder="Ej: Generador Eléctrico 3000W" required>
        </div>

        <div class="row">
            <div class="col form-group">
                <label for="categoria">Categoría</label>
                <input type="text" id="categoria" placeholder="Ej: Maquinaria" required>
            </div>
            <div class="col form-group">
                <label for="subcategoria">Subcategoría</label>
                <input type="text" id="subcategoria" placeholder="Ej: Generadores">
            </div>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción Detallada / Ficha Técnica</label>
            <textarea id="descripcion" placeholder="Incluye dimensiones, potencia, marca, materiales y cualquier detalle relevante para la cotización..." required></textarea>
        </div>

        <div class="row">
            <div class="col form-group">
                <label for="stock">Stock Actual</label>
                <input type="number" id="stock" value="0">
            </div>
            <div class="col form-group">
                <label for="foto">Imagen (JPG/PNG)</label>
                <input type="file" id="foto" accept="image/*" required>
            </div>
        </div>

        <div class="preview-box">
            <img id="preview-img" src="" alt="Vista previa">
        </div>

        <button type="submit" id="btn-submit">Inyectar a la Base de Datos</button>
    </form>
</div>

<script>
    const fotoInput = document.getElementById('foto');
    const previewImg = document.getElementById('preview-img');

    fotoInput.onchange = evt => {
        const [file] = fotoInput.files;
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'inline-block';
        }
    }
</script>

</body>
</html>

</body>
</html>
