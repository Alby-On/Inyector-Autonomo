<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controlador de Inventario - Albyon Digital</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        
        input[type="file"] { background: #fafafa; padding: 10px; border: 1px dashed #bbb; cursor: pointer; width: 100%; box-sizing: border-box; }

        button {
            width: 100%; background-color: #3498db; color: white; padding: 14px; border: none; border-radius: 6px;
            font-size: 18px; cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        button:hover { background-color: #2980b9; }
        
        .preview-container { margin-top: 10px; text-align: center; }
        #preview-img { max-width: 100%; height: auto; border-radius: 8px; display: none; margin-top: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>Nuevo Producto al Catálogo</h2>
    
    <form id="product-form">
        <div class="form-group">
            <label for="nombre">Título del Producto</label>
            <input type="text" id="nombre" placeholder="Ej: Motor Trifásico 5HP" required>
        </div>

        <div class="form-group">
            <label for="foto">Imagen del Equipo</label>
            <input type="file" id="foto" accept="image/*" required>
            <div class="preview-container">
                <img id="preview-img" src="" alt="Vista previa">
            </div>
        </div>

        <div class="form-group">
            <label for="descripcion">Descripción / Ficha Técnica</label>
            <textarea id="descripcion" rows="4" placeholder="Detalles, dimensiones, potencia..."></textarea>
        </div>

        <div class="form-group">
            <label for="stock">Stock Disponible</label>
            <input type="number" id="stock" value="0" min="0">
        </div>

        <button type="submit" id="btn-submit">Publicar en Catálogo</button>
    </form>
</div>

<script>
    // Lógica simple para ver la foto antes de subirla (User Experience)
    const fotoInput = document.getElementById('foto');
    const previewImg = document.getElementById('preview-img');

    fotoInput.onchange = evt => {
        const [file] = fotoInput.files;
        if (file) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
        }
    }
</script>

</body>
</html>
